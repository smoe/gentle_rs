name: Release Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (example: v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-installers:
    name: Build Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            bundle_format: osx
            extension: dmg
            artifact_name: gentle-macos-installer
          - os: windows-latest
            platform: windows
            bundle_format: zip
            extension: zip
            artifact_name: gentle-windows-zip

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install ImageMagick (Windows only)
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install imagemagick --no-progress -y

      - name: Generate Windows .ico from PNG
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          magick assets/icon.png -define icon:auto-resize=256,128,64,48,32,16 assets/icon.ico
          if (!(Test-Path "assets/icon.ico")) {
            throw "assets/icon.ico was not generated"
          }

      - name: Install cargo-bundle
        if: runner.os == 'macOS'
        run: cargo install cargo-bundle --locked

      - name: Build macOS bundle
        if: runner.os == 'macOS'
        run: cargo bundle --release --bin gentle --format ${{ matrix.bundle_format }}

      - name: Build Windows binary
        if: runner.os == 'Windows'
        run: cargo build --release --bin gentle

      - name: Collect installer path
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            bundle_dir="target/release/bundle/osx"
            echo "runner.os=${{ runner.os }}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "bundle_dir=${bundle_dir}"
            if [[ ! -d "$bundle_dir" ]]; then
              echo "Bundle directory not found: $bundle_dir"
              exit 1
            fi
            echo "bundle_dir contents:"
            ls -la "$bundle_dir"

            echo "app bundle candidates:"
            find "$bundle_dir" -type d -name "*.app" -prune -print || true

            app_bundle="$(find "$bundle_dir" -type d -name "*.app" -prune -print | head -n 1)"
            if [[ -z "$app_bundle" ]]; then
              echo "No .app bundle found under $bundle_dir"
              exit 1
            fi
            echo "app_bundle=${app_bundle}"

            stage_dir="$RUNNER_TEMP/gentle_dmg_stage"
            echo "stage_dir=${stage_dir}"
            rm -rf "$stage_dir"
            mkdir -p "$stage_dir"
            cp -R "$app_bundle" "$stage_dir/"
            installer="target/release/bundle/osx/gentle-${RELEASE_TAG#refs/tags/}.dmg"
            echo "installer=${installer}"
            hdiutil create \
              -volname "GENtle" \
              -srcfolder "$stage_dir" \
              -ov \
              -format UDZO \
              "$installer"
            echo "created installer:"
            ls -la "$installer"
          else
            exe_path="target/release/gentle.exe"
            echo "runner.os=${{ runner.os }}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "exe_path=${exe_path}"
            if [[ ! -f "$exe_path" ]]; then
              echo "Windows binary not found: $exe_path"
              exit 1
            fi
            out_dir="target/release/bundle/zip"
            mkdir -p "$out_dir"
            installer="$out_dir/gentle-${RELEASE_TAG#refs/tags/}.zip"
            echo "installer=${installer}"
            powershell -NoProfile -Command "Compress-Archive -Path 'target/release/gentle.exe' -DestinationPath '$installer' -Force"
            echo "created installer:"
            ls -la "$installer"
          fi
          echo "installer_path=$installer" >> "$GITHUB_OUTPUT"
          echo "Installer: $installer"

      - name: Smoke test macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          installer="${{ steps.collect.outputs.installer_path }}"
          mount_point="$RUNNER_TEMP/gentle_dmg_mount"
          mkdir -p "$mount_point"
          hdiutil attach "$installer" -mountpoint "$mount_point" -nobrowse -quiet
          app_path="$(find "$mount_point" -maxdepth 2 -name '*.app' | head -n 1)"
          if [[ -z "$app_path" ]]; then
            echo "No .app bundle found in mounted DMG"
            exit 1
          fi
          test -f "$app_path/Contents/Info.plist"
          hdiutil detach "$mount_point" -quiet

      - name: Smoke test Windows package
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $installer = "${{ steps.collect.outputs.installer_path }}"
          $resolvedInstaller = (Resolve-Path $installer).Path
          if (-not $resolvedInstaller) {
            throw "Could not resolve installer path: $installer"
          }
          $installerItem = Get-Item $resolvedInstaller
          Write-Host "installer=$resolvedInstaller"
          Write-Host "installer_size_bytes=$($installerItem.Length)"
          $hash = (Get-FileHash -Path $resolvedInstaller -Algorithm SHA256).Hash
          Write-Host "installer_sha256=$hash"

          $extract = Join-Path $env:RUNNER_TEMP "gentle_zip_extract"
          if (Test-Path $extract) {
            Remove-Item -Recurse -Force $extract
          }
          New-Item -ItemType Directory -Path $extract -Force | Out-Null
          Expand-Archive -Path $resolvedInstaller -DestinationPath $extract -Force

          $exe = Get-ChildItem -Path $extract -Filter gentle.exe -Recurse | Select-Object -First 1
          if (-not $exe) {
            throw "No gentle.exe found after ZIP extraction"
          }
          if ($exe.Length -le 0) {
            throw "Extracted gentle.exe is empty"
          }
          Write-Host "zip_extracted_exe=$($exe.FullName)"
          Write-Host "zip_extracted_exe_size_bytes=$($exe.Length)"

      - name: Normalize installer filename
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG#refs/tags/}"
          arch="$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')"
          out_dir="dist"
          mkdir -p "$out_dir"
          out_path="$out_dir/gentle-${tag}-${{ matrix.platform }}-${arch}.${{ matrix.extension }}"
          cp "${{ steps.collect.outputs.installer_path }}" "$out_path"
          echo "output_path=$out_path" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.normalize.outputs.output_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-installers
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show downloaded files
        run: |
          find dist -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/**/*.dmg
            dist/**/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
