<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f4ec"/>
      <stop offset="100%" stop-color="#efe5d4"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f8f2e7"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#33424f"/>
    </marker>
    <style>
      text {
        font-family: "Helvetica Neue", Arial, sans-serif;
        fill: #24313d;
      }
      .title {
        font-size: 42px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 20px;
        fill: #536372;
      }
      .kicker {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1.0px;
        text-transform: uppercase;
        fill: #8b6747;
      }
      .panel {
        fill: url(#panelFill);
        stroke: #dccfb8;
        stroke-width: 1.5;
        rx: 30;
      }
      .panelTitle {
        font-size: 26px;
        font-weight: 700;
      }
      .body {
        font-size: 18px;
        fill: #55626f;
      }
      .small {
        font-size: 15px;
        fill: #6b7884;
      }
      .badge {
        fill: #24313d;
      }
      .badgeText {
        font-size: 18px;
        font-weight: 700;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .axis {
        stroke: #33424f;
        stroke-width: 4;
        stroke-linecap: round;
      }
      .transcript {
        fill: #2e6fda;
      }
      .transcriptAlt {
        fill: #8cb2f0;
      }
      .transcriptArrow {
        stroke: none;
      }
      .insert {
        fill: #43aaa1;
        fill-opacity: 0.88;
      }
      .insertLabel {
        font-size: 18px;
        font-weight: 700;
        fill: #ffffff;
      }
      .muted {
        fill: #d8dcdf;
      }
      .snp {
        fill: #ef8f2f;
        stroke: #b05b00;
        stroke-width: 2;
      }
      .connector {
        stroke: #33424f;
        stroke-width: 4;
        fill: none;
        marker-end: url(#arrowHead);
      }
      .callout {
        fill: #edf3f6;
        stroke: #d8e4eb;
        stroke-width: 1.5;
        rx: 18;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="920" fill="url(#bg)"/>
  <rect x="56" y="50" width="430" height="36" rx="18" fill="#f0dfbf"/>
  <text x="78" y="74" class="kicker">ClawBio alert to GENtle reporter design</text>
  <text x="60" y="128" class="title">VKORC1 upstream fragment to luciferase reporter</text>
  <text x="60" y="162" class="subtitle">Use a reverse-strand VKORC1 promoter fragment that keeps rs9923231 inside the insert, then inspect the cloned reporter as a real GENtle map.</text>

  <g transform="translate(60,210)">
    <rect class="panel" width="690" height="640"/>
    <circle cx="44" cy="48" r="22" class="badge"/>
    <text x="44" y="48" class="badgeText">1</text>
    <text x="84" y="52" class="panelTitle" font-size="22">Isolation of promoter region of VKORC1</text>
    <text x="84" y="82" class="panelTitle" font-size="22">entailing the Warfarin-sensitivity locus</text>
    <text x="36" y="138" class="body">Reverse-strand promoter context lies right of the TSS.</text>

    <text x="36" y="188" class="small">Local GRCh38 view around rs9923231</text>
    <g transform="translate(0,28)">
      <text x="140" y="298" class="small">31,094,600</text>
      <text x="570" y="298" class="small" text-anchor="end">31,096,600</text>
      <text x="392" y="244" class="small" text-anchor="middle">Chromosome 16</text>
      <line x1="140" y1="270" x2="570" y2="270" class="axis"/>

      <path d="M176 214 H286 L304 226 L286 238 H176 Q164 238 164 226 Q164 214 176 214 Z" class="transcriptAlt transcriptArrow"/>
      <text x="236" y="192" class="small" text-anchor="middle">LOC124903680</text>

      <path d="M160 340 L178 326 H316 Q330 326 330 340 Q330 354 316 354 H178 Z" class="transcript transcriptArrow"/>
      <text x="244" y="344" font-size="18" font-weight="700" fill="#ffffff">VKORC1</text>

      <rect x="330" y="320" width="214" height="40" rx="18" class="insert"/>
      <text x="356" y="346" class="insertLabel">source interval</text>
      <text x="350" y="386" class="small">selected genomic coordinates</text>

      <rect x="548" y="330" width="22" height="20" rx="10" class="muted"/>
      <text x="452" y="406" class="small">keep 500 bp beyond rs9923231</text>

      <line x1="330" y1="220" x2="330" y2="404" stroke="#8fa3b5" stroke-width="3" stroke-dasharray="8 7"/>
      <text x="330" y="206" class="small" text-anchor="middle">VKORC1 TSS</text>

      <line x1="468" y1="224" x2="468" y2="316" stroke="#ef8f2f" stroke-width="5"/>
      <circle cx="468" cy="208" r="14" class="snp"/>
      <text x="426" y="182" class="body">rs9923231</text>
    </g>

    <rect x="36" y="456" width="618" height="122" class="callout"/>
    <text x="60" y="492" class="body">Figure rule for the default reporter insert</text>
    <text x="60" y="524" class="small">1. Keep a little transcribed VKORC1 context near the TSS.</text>
    <text x="60" y="548" class="small">2. Keep rs9923231 inside the insert, not at the edge.</text>
    <text x="60" y="572" class="small">3. After cloning, compare allele-matched luciferase reporters.</text>

    <rect x="36" y="604" width="618" height="28" rx="14" fill="#e7efe9"/>
    <text x="56" y="623" class="small">Left panel stays schematic so the selection logic reads cleanly.</text>
  </g>

  <path d="M 758 530 C 772 530 786 530 800 530" class="connector"/>

  <g transform="translate(810,210)">
    <rect class="panel" width="730" height="640"/>
    <circle cx="44" cy="48" r="22" class="badge"/>
    <text x="44" y="48" class="badgeText">2</text>
    <text x="84" y="56" class="panelTitle">GENtle derives parameters for functional studies</text>
    <text x="36" y="102" class="body">Luciferase reports promoter output as light.</text>
    <text x="36" y="126" class="body">Stronger transcription makes more luciferase enzyme and a brighter assay signal.</text>

    <rect x="28" y="152" width="674" height="452" rx="26" fill="#ffffff" stroke="#e2d6c4" stroke-width="1.5"/>
  </g>

  <svg x="840" y="378" width="674" height="393" viewBox="0 0 1200 700">
    <text fill="#111111" font-family="monospace" font-size="18" x="20" y="34">VKRSLUC1</text>
    <text fill="#444444" font-family="monospace" font-size="14" x="20" y="54">4952 bp</text>
    <circle cx="672" cy="364" fill="none" r="231.00002" stroke="#000000" stroke-width="2"/>
    <path d="M 672.000 107.831 A 256.169 256.169 0 0 1 859.459 538.591" fill="none" stroke="#43aaa1" stroke-width="6"/>
    <line x1="940" y1="422" x2="1002" y2="422" stroke="#43aaa1" stroke-width="3" stroke-linecap="round"/>
    <text fill="#43aaa1" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="start" x="1014" y="430">Insert</text>
    <text fill="#111111" font-family="monospace" font-size="12" text-anchor="middle" x="926.9931" y="252.83934">VKORC1 promoter insert</text>
    <line data-gentle-role="variation-marker-line" stroke="#e17f0f" stroke-width="2.5" x1="782.07764" x2="798.47217" y1="176.82974" y2="148.95332"/>
    <circle cx="798.47217" cy="148.95332" data-gentle-role="variation-marker-dot" fill="#ffffff" r="4" stroke="#e17f0f" stroke-width="2"/>
    <line x1="818" y1="126" x2="874" y2="102" stroke="#e17f0f" stroke-width="3" stroke-linecap="round"/>
    <text fill="#e17f0f" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="888" y="108">Variation</text>
    <text fill="#111111" font-family="monospace" font-size="12" text-anchor="middle" x="809.62494" y="129.98976">rs9923231</text>
    <path d="M 859.955 539.053 A 256.847 256.847 0 0 1 425.919 437.584" fill="none" stroke="#cc1f1f" stroke-width="6"/>
    <path d="M859.9548,539.05286 L867.2725,545.8683 L862.771,550.6949" data-gentle-role="transcription-start-arrow-shaft" fill="none" stroke="#cc1f1f" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
    <path d="M861.5433,552.0112 L869.38116,549.47205 L863.5269,544.01965 z" data-gentle-role="transcription-start-arrow" fill="#cc1f1f" stroke="none"/>
    <line x1="612" y1="632" x2="612" y2="664" stroke="#cc1f1f" stroke-width="3" stroke-linecap="round"/>
    <text fill="#cc1f1f" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" x="612" y="692">Luciferase</text>
    <text fill="#111111" font-family="monospace" font-size="12" text-anchor="middle" x="608.5225" y="635.526">luc2</text>
    <path d="M 418.122 432.257 A 262.893 262.893 0 0 1 410.974 395.281" fill="none" stroke="#6e6e6e" stroke-width="6"/>
    <text fill="#111111" font-family="monospace" font-size="12" text-anchor="middle" x="392.31952" y="418.2498">SV40 polyA</text>
    <path d="M 470.064 370.408 A 202.038 202.038 0 0 1 573.358 187.679" fill="none" stroke="#cc1f1f" stroke-width="6"/>
    <path d="M573.3584,187.6791 L568.4761,178.95197 L562.71814,182.17784" data-gentle-role="transcription-start-arrow-shaft" fill="none" stroke="#cc1f1f" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
    <path d="M561.1478,183.05762 L565.47626,176.04764 L569.38214,183.02933 z" data-gentle-role="transcription-start-arrow" fill="#cc1f1f" stroke="none"/>
    <text fill="#111111" font-family="monospace" font-size="12" text-anchor="middle" x="515.2145" y="275.5021">bla</text>
    <path d="M 567.576 123.628 A 262.074 262.074 0 0 1 671.667 101.926" fill="none" stroke="#6e6e6e" stroke-width="6"/>
    <text fill="#111111" font-family="monospace" font-size="12" text-anchor="middle" x="614.01917" y="85.90564">ColE1 ori</text>
  </svg>

  <rect x="60" y="868" width="1480" height="28" rx="14" fill="#ede3cf"/>
  <text x="84" y="887" class="small">Intended use: community-facing hero figure for the VKORC1/rs9923231 reporter story, with a simplified locus explainer on the left and a real post-cloning construct export on the right.</text>
</svg>
