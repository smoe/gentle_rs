<svg xmlns="http://www.w3.org/2000/svg" width="1044" height="486" viewBox="0 0 1044 486" role="img" aria-labelledby="title desc" data-protocol-id="readme.pcr_blunt_vector_ligation"><title id="title">GENtle Protocol Cartoon: PCR Product -&gt; Blunt-Cut Vector -&gt; Ligate</title><desc id="desc">Minimal blunt-end cloning hero: make a blunt PCR product, open a vector with SmaI, and ligate the amplicon into the blunt backbone.</desc><defs><linearGradient id="pc_bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5fbff"/><stop offset="100%" stop-color="#edf8f5"/></linearGradient><linearGradient id="pc_panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f6fafb"/></linearGradient><pattern id="pc_dots_50" patternUnits="userSpaceOnUse" width="6" height="6"><circle cx="1.5" cy="1.5" r="0.8" fill="#ffffff" fill-opacity="0.88"/><circle cx="4.5" cy="4.5" r="0.8" fill="#ffffff" fill-opacity="0.88"/></pattern><marker id="pc_arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#4e6d78"/></marker><style>.pc_title { font: 700 36px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #0f2a36; }.pc_sub { font: 500 18px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #36535d; }.pc_panel_title { font: 700 21px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #123746; }.pc_panel_sub { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #3f5f68; }.pc_caption { font: 500 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #466570; }.pc_mol_label { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #2d4f5b; }.pc_end_label { font: 600 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #375965; }.pc_feature_marker_text { font: 700 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_primer_label { font: 700 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_primer_end_label { font: 600 9px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #375965; }.pc_step_num { font: 700 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_box { fill: url(#pc_panel); stroke: #c8dde3; stroke-width: 2; }.pc_link { stroke: #4e6d78; stroke-width: 3.2; marker-end: url(#pc_arrow); fill: none; }</style></defs><rect x="0" y="0" width="1044" height="486" fill="url(#pc_bg)"/><rect x="14" y="14" width="1016" height="458" rx="22" fill="none" stroke="#d4e4e8" stroke-width="2"/><text x="36.0" y="66.0" class="pc_title">GENtle Protocol Cartoon: PCR Product -&gt; Blunt-Cut Vector -&gt; Ligate</text><text x="36.0" y="94.0" class="pc_sub">Minimal blunt-end cloning hero: make a blunt PCR product, open a vector with SmaI, and ligate the amplicon into the blunt backbone.</text><rect class="pc_box" x="36.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="context" data-action="Context"/><circle cx="60.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="60.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">1</text><text x="82.0" y="144.0" class="pc_panel_title">Inputs</text><text x="54.0" y="166.0" class="pc_panel_sub">Context</text><text x="54.0" y="186.0" class="pc_caption">Blunt PCR insert and intact circular pGEX</text><text x="54.0" y="202.0" class="pc_caption">vector; the orange arc marks the MCS.</text><g data-molecule-id="pcr_product" data-topology="linear"><text x="52.0" y="240.0" class="pc_mol_label">PCR product</text><text x="98.4" y="267.5" class="pc_end_label" text-anchor="end" dominant-baseline="middle">blunt</text><text x="281.6" y="267.5" class="pc_end_label" text-anchor="start" dominant-baseline="middle">blunt</text><rect x="104.4" y="258.0" width="171.1" height="8" fill="#cfd8dc" data-fill-pattern="solid"/><rect x="104.4" y="269.0" width="171.1" height="8" fill="#cfd8dc" data-fill-pattern="dots_50"/><rect x="104.4" 