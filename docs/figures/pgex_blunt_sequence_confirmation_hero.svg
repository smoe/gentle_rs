<svg xmlns="http://www.w3.org/2000/svg" width="1044" height="486" viewBox="0 0 1044 486" role="img" aria-labelledby="title desc" data-protocol-id="readme.pcr_blunt_unknown_insert_degenerate"><title id="title">GENtle: Unknown Insert + Degenerate Primers</title><desc id="desc">Degenerate primers recover the insert; cloned products are then sequenced from the vector flanks as usual.</desc><defs><linearGradient id="pc_bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5fbff"/><stop offset="100%" stop-color="#edf8f5"/></linearGradient><linearGradient id="pc_panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f6fafb"/></linearGradient><pattern id="pc_dots_50" patternUnits="userSpaceOnUse" width="6" height="6"><circle cx="1.5" cy="1.5" r="0.8" fill="#ffffff" fill-opacity="0.88"/><circle cx="4.5" cy="4.5" r="0.8" fill="#ffffff" fill-opacity="0.88"/></pattern><marker id="pc_arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#4e6d78"/></marker><style>.pc_title { font: 700 36px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #0f2a36; }.pc_sub { font: 500 18px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #36535d; }.pc_panel_title { font: 700 21px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #123746; }.pc_panel_sub { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #3f5f68; }.pc_caption { font: 500 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #466570; }.pc_mol_label { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #2d4f5b; }.pc_end_label { font: 600 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #375965; }.pc_feature_marker_text { font: 700 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_primer_label { font: 700 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_primer_end_label { font: 600 9px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #375965; }.pc_step_num { font: 700 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_box { fill: url(#pc_panel); stroke: #c8dde3; stroke-width: 2; }.pc_link { stroke: #4e6d78; stroke-width: 3.2; marker-end: url(#pc_arrow); fill: none; }</style></defs><rect x="0" y="0" width="1044" height="486" fill="url(#pc_bg)"/><rect x="14" y="14" width="1016" height="458" rx="22" fill="none" stroke="#d4e4e8" stroke-width="2"/><text x="36.0" y="66.0" class="pc_title">GENtle: Unknown Insert + Degenerate Primers</text><text x="36.0" y="94.0" class="pc_sub">Degenerate primers recover the insert; cloned products are then sequenced from the vector flanks as usual.</text><rect class="pc_box" x="36.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="degenerate_capture" data-action="Context"/><circle cx="60.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="60.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">1</text><text x="82.0" y="144.0" class="pc_panel_title">Degenerate Primers</text><text x="54.0" y="166.0" class="pc_panel_sub">Context</text><text x="54.0" y="186.0" class="pc_caption">Degenerate primers dL and dR bind conserved</text><text x="54.0" y="202.0" class="pc_caption">motifs that flank the still-unknown insert</text><text x="54.0" y="218.0" class="pc_caption">sequence.</text><g data-molecule-id="degenerate_pcr_source" data-topology="linear"><text x="52.0" y="240.0" class="pc_mol_label">Conserved motifs around unknown insert</text><rect x="104.4" y="258.0" width="25.7" height="8" fill="#2a9d8f" data-fill-pattern="solid"/><rect x="130.1" y="258.0" width="22.8" height="8" fill="#c45b4d" data-fill-pattern="solid"/><rect x="152.9" y="258.0" width="74.2" height="8" fill="#cfd8dc" data-fill-pattern="solid"/><rect x="227.1" y="258.0" width="22.8" height="8" fill="#c45b4d" data-fill-pattern="solid"/><rect x="249.9" y="258.0" width="25.7" height="8" fill="#2a9d8f" data-fill-pattern="solid"/><rect x="104.4" y="269.0" width="25.7" height="8" fill="#2a9d8f" data-fill-pattern="solid"/><rect x="130.1" y="269.0" width="22.8" height="8" fill="#c45b4d" data-fill-pattern="solid"/><rect x="152.9" y="269.0" width="74.2" height="8" fill="#cfd8dc" data-fill-pattern="dots_50"/><rect x="152.9" y="269.0" width="74.2" height="8" fill="url(#pc_dots_50)" opacity="0.78" data-fill-pattern-overlay="dots_50"/><rect x="227.1" y="269.0" width="22.8" height="8" fill="#c45b4d" data-fill-pattern="solid"/><rect x="249.9" y="269.0" width="25.7" height="8" fill="#2a9d8f" data-fill-pattern="solid"/></g><path d="M 348.0 289.0 L 362.0 289.0" class="pc_link"/><rect class="pc_box" x="368.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="clone_recovered_product" data-action="Clone amplicon"/><circle cx="392.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="392.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">2</text><text x="414.0" y="144.0" class="pc_panel_title">Clone Recovered Product</text><text x="386.0" y="166.0" class="pc_panel_sub">Clone amplicon</text><text x="386.0" y="186.0" class="pc_caption">After the degenerate-PCR product is cloned,</text><text x="386.0" y="202.0" class="pc_caption">the insert sits between known vector flanks</text><text x="386.0" y="218.0" class="pc_caption">just like any other plasmid insert.</text><g data-molecule-id="cloned_unknown_insert" data-topology="linear"><text x="384.0" y="240.0" class="pc_mol_label">Recovered insert in vector</text><rect x="436.4" y="258.0" width="47.9" height="8" fill="#6d7f8b" data-fill-pattern="solid"/><rect x="484.4" y="258.0" width="6.8" height="8" fill="#d68f2a" data-fill-pattern="solid"/><rect x="491.2" y="258.0" width="61.6" height="8" fill="#cfd8dc" data-fill-pattern="solid"/><rect x="552.8" y="258.0" width="6.8" height="8" fill="#d68f2a" data-fill-pattern="solid"/><rect x="559.6" y="258.0" width="47.9