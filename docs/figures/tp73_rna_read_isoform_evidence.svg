  <title
     id="title">GENtle TP73 RNA-read isoform evidence workflow</title>
  <desc
     id="desc">Compact grant-style schematic showing GENtle screening nanopore cDNA or RNA-seq reads against TP73 transcript templates, retaining candidate fragments, aligning them, and marking exon-transition evidence that supports TP73 isoform classes.</desc>
