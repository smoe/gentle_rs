<svg xmlns="http://www.w3.org/2000/svg" width="2040" height="486" viewBox="0 0 2040 486" role="img" aria-labelledby="title desc" data-protocol-id="pcr.oe.substitution"><title id="title">OE-PCR Figures 1-6: Setup, Primer Design, First PCR, Denature, Anneal, Fill</title><desc id="desc">Figure 1 defines target + insert context with outer primers a/f. Figure 2 places all six primers (a-f) with chimeric overhang intent. Figure 3 shows first-step PCR products AB, CD, and EF. Figure 4 denatures to single strands. Figure 5 anneals 9-nt overlaps into one hybrid template. Figure 6 shows polymerase gap filling before second-step amplification with a/f.</desc><defs><linearGradient id="pc_bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5fbff"/><stop offset="100%" stop-color="#edf8f5"/></linearGradient><linearGradient id="pc_panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f6fafb"/></linearGradient><marker id="pc_arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#4e6d78"/></marker><style>.pc_title { font: 700 36px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #0f2a36; }.pc_sub { font: 500 18px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #36535d; }.pc_panel_title { font: 700 21px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #123746; }.pc_panel_sub { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #3f5f68; }.pc_caption { font: 500 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #466570; }.pc_mol_label { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #2d4f5b; }.pc_end_label { font: 600 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #375965; }.pc_feature_marker_text { font: 700 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_primer_label { font: 700 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_primer_end_label { font: 600 9px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #375965; }.pc_step_num { font: 700 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_box { fill: url(#pc_panel); stroke: #c8dde3; stroke-width: 2; }.pc_link { stroke: #4e6d78; stroke-width: 3.2; marker-end: url(#pc_arrow); fill: none; }</style></defs><rect x="0" y="0" width="2040" height="486" fill="url(#pc_bg)"/><rect x="14" y="14" width="2012" height="458" rx="22" fill="none" stroke="#d4e4e8" stroke-width="2"/><text x="36.0" y="66.0" class="pc_title">OE-PCR Figures 1-6: Setup, Primer Design, First PCR, Denature, Anneal, Fill</text><text x="36.0" y="94.0" class="pc_sub">Figure 1 defines target + insert context with outer primers a/f. Figure 2 places all six primers (a-f) with chimeric overhang intent. Figure 3 shows first-step PCR products AB, CD, and EF. Figure 4 denatures to single strands. Figure 5 anneals 9-nt overlaps into one hybrid template. Figure 6 shows polymerase gap filling before second-step amplification with a/f.</text><rect class="pc_box" x="36.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="starting_segments" data-action="Context"/><circle cx="60.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="60.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">1</text><text x="82.0" y="144.0" class="pc_panel_title">Figure 1</text><text x="54.0" y="166.0" class="pc_panel_sub">Context</text><text x="54.0" y="186.0" class="pc_caption">Target DNA has blue/red substitution</text><text x="54.0" y="202.0" class="pc_caption">boundaries around span X, with secondary-PCR</text><text x="54.0" y="218.0" class="pc_caption">outer primers a (top-left) and f</text><g data-molecule-id="target_dna" data-topology="linear"><text x="52.0" y="240.0" class="pc_mol_label">Target DNA (contains substitution window)</text><rect x="104.4" y="258.0" width="61.4" height="8" fill