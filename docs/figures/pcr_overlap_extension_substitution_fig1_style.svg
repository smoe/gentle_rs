171.1" height="8" fill="#2a9d8f"/><rect x="104.4" y="341.0" width="171.1" height="8" fill="#2a9d8f"/></g><path d="M 348.0 289.0 L 362.0 289.0" class="pc_link"/><rect class="pc_box" x="368.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="primer_design_assignment" data-action="Primer design"/><circle cx="392.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="392.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">2</text><text x="414.0" y="144.0" class="pc_panel_title">Figure 2</text><text x="386.0" y="166.0" class="pc_panel_sub">Primer design</text><text x="386.0" y="186.0" class="pc_caption">All six primers are defined. b/e are chimeric</text><text x="386.0" y="202.0" class="pc_caption">(18 nt template-derived at 3&apos; plus 9 nt</text><text x="386.0" y="218.0" class="pc_caption">insert-derived at 5&apos;). c/d are chimeric (18 nt</text><g data-molecule-id="target_with_primers" data-topology="linear"><text x="384.0" y="240.0" class="pc_mol_label">Target template with a, b, e, f</text><rect x="436.4" y="258.0" width="57.3" height="8" fill="#c9b37e"/><rect x="493.7" y="258.0" width="12.8" height="8" fill="#3d6fb6"/><rect x="506.5" y="258.0" width="31.0" height="8" fill="#9ca3af"/><rect x="537.5" y="258.0" width="12.8" height="8" fill="#d1495b"/><rect x="550.3" y="258.0" width="57.3" height="8" fill="#c9b37e"/><rect x="436.4" y="269.0" width="57.3" height="8" fill="#c9b37e"/><rect x="493.7" y="269.0" width="12.8" height="8" fill="#3d6fb6"/><rect x="506.5" y="269.0" width="31.0" height="8" fill="#9ca3af"/><rect x="537.5" y="269.0" width="12.8" height="8" fill="#d1495b"/><rect x="550.3" y="269.0" width="57.3" height="8" fill="#c9b37e"/><g data-primer-glyph="a" data-primer-anchor="top" data-primer-rotation="0"><line x1="444.4" y1="258.0" x2="444.4" y2="256.0" stroke="#c9b37e" stroke-width="1.4"/><rect x="434.4" y="250.0" width="20.0" height="5.0" rx="2.2" fill="#c9b37e" stroke="#c9b37e" stroke-width="0.8"/><text x="444.4" y="252.9" class="pc_primer_label" text-anchor="middle" dominant-baseline="middle">a</text><text x="430.9" y="246.5" class="pc_primer_end_label" text-anchor="end" dominant-baseline="middle">5&apos;</text><text x="457.9" y="246.5" class="pc_primer_end_label" text-anchor="start" dominant-baseline="middle">3&apos;</text></g><g data-primer-glyph="b" data-primer-anchor="bottom" data-primer-rotation="0" data-primer-kink="true"><line x1="498.4" y1="269.0" x2="498.4" y2="274.0" stroke="#3d6fb6" stroke-width="1.4"/><rect x="488.4" y="279.0" width="20.0" height="5.0" rx="2.2" fill="#3d6fb6" stroke="#3d6fb6" stroke-width="0.8"/><text x="498.4" y="281.9" class="pc_primer_label" text-anchor="middle" dominant-baseline="middle">b</text><text x="484.9" y="290.5" class="pc_primer_end_label" text-anchor="end" dominant-baseline="middle">3&apos;</text><text x="511.9" y="290.5" class="pc_primer_end_label" text-anchor="start" dominant-baseline="middle">5&apos;</text><path d="M 508.4 281.5 L 513.9 286.3 L 526.9 286.3" stroke="#2a9d8f" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><g data-primer-glyph="e" data-primer-anchor="top" data-primer-rotation="0" data-primer-kink="true"><line x1="545.6" y1="258.0" x2="545.6" y2="256.0" stroke="#d1495b" stroke-width="1.4"/><rect x="535.6" y="250.0" width="20.0" height="5.0" rx="2.2" fill="#d1495b" stroke="#d1495b" stroke-width="0.8"/><text x="545.6" y="252.9" class="pc_primer_label" text-anchor="middle" dominant-baseline="middle">e</text><text x="532.1" y="246.5" class="pc_primer_end_label" text-anchor="end" dominant-baseline="middle">5&apos;</text><text x="559.1" y="246.5" class="pc_primer_end_label" text-anchor="start" dominant-baseline="middle">3&apos;</text><path d="M 535.6 252.5 L 530.1 247.7 L 517.1 247.7" stroke="#2a9d8f" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><g data-primer-glyph="f" data-primer-anchor="bottom" data-primer-rotation="0"><line x1="599.6" y1="269.0" x2="599.