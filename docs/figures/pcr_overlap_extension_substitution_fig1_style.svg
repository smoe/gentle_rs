b"/><rect x="768.4" y="341.0" width="15.7" height="8" fill="#3d6fb6"/><rect x="784.2" y="341.0" width="139.7" height="8" fill="#2a9d8f"/><rect x="923.8" y="341.0" width="15.7" height="8" fill="#d1495b"/></g><g data-molecule-id="ef_first_pcr_product" data-topology="linear"><text x="716.0" y="384.0" class="pc_mol_label">EF product (e + f)</text><rect x="768.4" y="402.0" width="9.9" height="8" fill="#2a9d8f"/><rect x="778.3" y="402.0" width="29.6" height="8" fill="#d1495b"/><rect x="807.9" y="402.0" width="131.6" height="8" fill="#c9b37e"/><rect x="768.4" y="413.0" width="9.9" height="8" fill="#2a9d8f"/><rect x="778.3" y="413.0" width="29.6" height="8" fill="#d1495b"/><rect x="807.9" y="413.0" width="131.6" height="8" fill="#c9b37e"/></g><path d="M 1012.0 289.0 L 1026.0 289.0" class="pc_link"/><rect class="pc_box" x="1032.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="denature_single_strands" data-action="Denature"/><circle cx="1056.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="1056.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">4</text><text x="1078.0" y="144.0" class="pc_panel_title">Figure 4</text><text x="1050.0" y="166.0" class="pc_panel_sub">Denature</text><text x="1050.0" y="186.0" class="pc_caption">Heat denaturation separates AB, CD, and EF</text><text x="1050.0" y="202.0" class="pc_caption">duplex products into single strands; each</text><text x="1050.0" y="218.0" class="pc_caption">strand retains the same incorporated</text><g data-molecule-id="ab_single_strand" data-topology="linear"><text x="1048.0" y="240.0" class="pc_mol_label">AB strand</text><rect x="1100.4" y="258.0" width="131.6" height="8" fill="#c9b37e"/><rect x="1232.1" y="258.0" width="29.6" height="8" fill="#3d6fb6"/><rect x="1261.7" y="258.0" width="9.9" height="8" fill="#2a9d8f"/></g><g data-molecule-id="cd_single_strand" data-topology="linear"><text x="1048.0" y="312.0" class="pc_mol_label">CD strand</text><rect x="1100.4" y="330.0" width="1