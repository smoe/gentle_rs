<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1708 454" role="img" aria-labelledby="title desc" data-protocol-id="gibson.two_fragment"><title id="title">GENtle Protocol Cartoon: Gibson Two-Fragment (A+B)</title><desc id="desc">Five-step Gibson mechanism with origin colors (A=yellow, B=blue) and a 30 bp homologous overlap</desc><defs><linearGradient id="pc_bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5fbff"/><stop offset="100%" stop-color="#edf8f5"/></linearGradient><linearGradient id="pc_panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f6fafb"/></linearGradient><marker id="pc_arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#4e6d78"/></marker><style>.pc_title { font: 700 36px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #0f2a36; }.pc_sub { font: 500 18px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #36535d; }.pc_panel_title { font: 700 21px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #123746; }.pc_panel_sub { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #3f5f68; }.pc_caption { font: 500 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #466570; }.pc_mol_label { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #2d4f5b; }.pc_end_label { font: 600 11px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #375965; }.pc_step_num { font: 700 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_box { fill: url(#pc_panel); stroke: #c8dde3; stroke-width: 2; }.pc_link { stroke: #4e6d78; stroke-width: 3.2; marker-end: url(#pc_arrow); fill: none; }</style></defs><rect x="0" y="0" width="1708" height="454" fill="url(#pc_bg)"/><rect x="14" y="14" width="1680" height="426" rx="22" fill="none" stroke="#d4e4e8" stroke-width="2"/><text x="36.0" y="66.0" class="pc_title">GENtle Protocol 