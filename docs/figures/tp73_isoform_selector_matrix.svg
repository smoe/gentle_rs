<title>TP73 cDNA isoform-selector PCR matrix</title>
<style>text{font-family:Avenir Next,Segoe UI,Arial,sans-serif}.title{font-size:25px;font-weight:800;fill:#0f172a}.sub{font-size:13px;fill:#475569}.hdr{font-size:12px;font-weight:800;fill:#0f172a}.small{font-size:10px;fill:#475569}.seq{font-size:9px;fill:#334155;font-family:Menlo,Consolas,monospace}.celltext{font-size:11px;font-weight:700;fill:#0f172a}.len{font-size:10px;fill:#334155}.none{fill:#f1f5f9;stroke:#cbd5e1}.single{fill:#dcfce7;stroke:#16a34a}.multi{fill:#fef3c7;stroke:#d97706}.fail{stroke:#dc2626;stroke-width:2}.warn{stroke:#f97316;stroke-width:1.4}.pass{stroke-width:1}</style>
