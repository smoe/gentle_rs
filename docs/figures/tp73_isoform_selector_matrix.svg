<rect x="18" y="18" width="1519" height="864" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
<text class="title" x="36" y="55">TP73 cDNA isoform-selector PCR matrix</text>
<text class="sub" x="36" y="78">Five 5-prime selector primers crossed with seven 3-prime splice/readout primers; products were tested with GENtle primers test-cdna-pcr on the bundled TP73 RefSeq locus.</text>
<text class="sub" x="36" y="99">Readout logic: α=α/β + α/γ/ζ, β=α/β + β/ε, γ=γ/ε + α/γ/ζ, δ=δ, ε=γ/ε + β/ε, ζ=ζ + α/γ/ζ; η has no separate local RefSeq cDNA row here.</text>
<text class="hdr" x="218" y="128">alpha/beta junction</text>
<text class="small" x="218" y="145">77485..77633 -&gt; 78412..78550</text>
<text class="seq" x="218" y="160">GAGCATCCCGGGGCCCAC</text>
<text class="hdr" x="403" y="128">beta/epsilon junction</text>
<text class="small" x="403" y="145">78412..78550 -&gt; 80232..83686</text>
<text class="seq" x="403" y="160">CCAGGTCCTGACGAGGCTGG</text>
<text class="hdr" x="588" y="128">gamma/epsilon junction</text>
<text class="small" x="588" y="145">76812..76933 -&gt; 78412..78550</text>
<text class="seq" x="588" y="160">ATCCCGGGGCGGCCTCTGTAG</text>
<text class="hdr" x="773" y="128">delta junction</text>
<text class="small" x="773" y="145">76812..76933 -&gt; 80232..83686</text>
<text class="seq" x="773" y="160">CCAGGTCGGCCTCTGTAGGAGCT</text>
<text class="hdr" x="958" y="128">zeta junction</text>
<text class="small" x="958" y="145">76812..76933 -&gt; 78948..79041</text>
<text class="seq" x="958" y="160">TCCTGTTAAAAAAGGCCTCTGTA</text>
<text class="hdr" x="1143" y="128">alpha/gamma/zeta junction</text>
<text class="small" x="1143" y="145">78948..79041 -&gt; 80232..83686</text>
<text class="seq" x="1143" y="160">CCCCAGGTCCTCAATGGTCA</text>
