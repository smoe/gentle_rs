.1" height="8" fill="#2a9d8f"/><rect x="552.6" y="254.0" width="9.2" height="8" fill="#4c5d9e"/><rect x="561.7" y="254.0" width="45.8" height="8" fill="#c9b37e"/><rect x="436.4" y="265.0" width="45.8" height="8" fill="#c9b37e"/><rect x="482.3" y="265.0" width="9.2" height="8" fill="#b5476d"/><rect x="491.4" y="265.0" width="61.1" height="8" fill="#2a9d8f"/><rect x="552.6" y="265.0" width="9.2" height="8" fill="#4c5d9e"/><rect x="561.7" y="265.0" width="45.8" height="8" fill="#c9b37e"/><line x1="486.9" y1="254.0" x2="486.9" y2="248.0" stroke="#b5476d" stroke-width="1.8"/><circle cx="486.9" cy="242.0" r="6.5" fill="#b5476d" data-feature-marker="F"/><text x="486.9" y="242.5" class="pc_feature_marker_text" text-anchor="middle" dominant-baseline="middle">F</text><line x1="557.1" y1="254.0" x2="557.1" y2="248.0" stroke="#4c5d9e" stroke-width="1.8"/><circle cx="557.1" cy="242.0" r="6.5" fill="#4c5d9e" data-feature-marker="R"/><text x="557.1" y="242.5" class="pc_feature_marker_text" text-anchor="middle" dominant-baseline="middle">R</text><path d="M 436.8 253.2 L 429.4 255.4 L 436.8 257.8 L 429.4 260.2 L 436.8 262.8 Z" fill="url(#pc_bg)"/><path d="M 436.8 264.2 L 429.4 266.4 L 436.8 268.8 L 429.4 271.2 L 436.8 273.8 Z" fill="url(#pc_bg)"/><circle cx="416.4" cy="260.0" r="1.5" fill="#88a3ad"/><circle cx="422.4" cy="262.6" r="1.5" fill="#88a3ad"/><circle cx="428.4" cy="265.2" r="1.5" fill="#88a3ad"/><path d="M 607.2 253.2 L 614.6 255.4 L 607.2 257.8 L 614.6 260.2 L 607.2 262.8 Z" fill="url(#pc_bg)"/><path d="M 607.2 264.2 L 614.6 266.4 L 607.2 268.8 L 614.6 271.2 L 607.2 273.8 Z" fill="url(#pc_bg)"/><circle cx="627.6" cy="260.0" r="1.5" fill="#88a3ad"/><circle cx="621.6" cy="262.6" r="1.5" fill="#88a3ad"/><circle cx="615.6" cy="265.2" r="1.5" fill="#88a3ad"/></g><g data-molecule-id="selected_roi" data-topology="linear"><text x="384.0" y="312.0" class="pc_mol_label">Selected ROI</text><text x="384.0" y="360.0" class="pc_end_label" text-anchor="start">blunt</text><text x="658.0" y="360.0" class="pc_end_label" text-anchor="end">blunt</text><rect x="436.4" y="326.0" width="171.1" height="8" fill="#2a9d8f"/><rect x="436.4" y="337.0" width="171.1" height="8" fill="#2a9d8f"/></g><path d="M 680.0 289.0 L 694.0 289.0" class="pc_link"/><rect class="pc_box" x="700.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="assay_setup" data-action="Assay Setup"/><circle cx="724.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="724.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">3</text><text x="746.0" y="144.0" class="pc_panel_title">Assay Setup</text><text x="718.0" y="166.0" class="pc_panel_sub">Assay Setup</text><text x="718.0" y="186.0" class="pc_caption">One primer-pair design attempt still brackets</text><text x="718.0" y="202.0" class="pc_caption">the ROI conceptually, but downstream</text><text x="718.0" y="218.0" class="pc_caption">constraint checks can reject every candidate.</text><g data-molecule-id="planned_amplicon" data-topology="linear"><text x="716.0" y="240.0" class="pc_mol_label">Planned amplicon</text><text x="716.0" y="288.0" class="pc_end_label" text-anchor="start">blunt</text><text x="990.0" y="288.0" class="pc_end_label" text-anchor="end">blunt</text><rect x="768.4" y="254.0" width="15.1" height="8" fill="#b5476d"/><rect x="783.5" y="254.0" width="20.1" height="8" fill="#e07a5f"/><rect x="803.7" y="254.0" width="100.7" height="8" fill="#2a9d8f"/><rect x="904.3" y="254.0" width="20.1" height="8" fill="#e07a5f"/><rect x="924.5" y="254.0" width="15.1" height="8" fill="#4c5d9e"/><rect x="768.4" y="265.0" width="15.1" height="8" fill="#b5476d"/><rect x="783.5" y="265.0" width="20.1" height="8" fill="#e07a5f"/><rect x="803.7" y="265.0" width="100.7" height="8" fill="#2a9d8f"/><rect x="904.3" y="265.0" width="20.1" height="8" fill="#e07a5f"/><rect x="924.5" y="265.0" width="15.1" height="8" fill="#4c5d9e"/><line x1="776.0" y1="254.0" x2="776.0" y2="248.0" stroke="#b5476d" stroke-width="1.8"/><circle cx="776.0" cy="242.0" r="6.5" fill="#b5476d" data-feature-marker="F"/><text x="776.0" y="242.5" class="pc_feature_marker_text" text-anchor="middle" dominant-baseline="middle">F</text><line x1="932.0" y1="254.0" x2="932.0" y2="248.0" stroke="#4c5d9e" stroke-width="1.8"/><circle cx="932.0" cy="242.0" r="6.5" fill="#4c5d9e" data-feature-marker="R"/><text x="932.0" y="242.5" class="pc_feature_marker_text" text-anchor="middle" dominant-baseline="middle">R</text></g><path d="M 1012.0 289.0 L 1026.0 289.0" class="pc_link"/><rect class="pc_box" x="1032.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="review" data-action="Review"/><circle cx="1056.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="1056.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">4</text><text x="1078.0" y="144.0" class="pc_panel_title">Review</text><text x="1050.0" y="166.0" class="pc_panel_sub">Review</text><text x="1050.0" y="186.0" class="pc_caption">Constraint checks exhaust the candidate space,</text><text x="1050.0" y="202.0" class="pc_caption">so the workflow keeps an explanation report</text><text x="1050.0" y="218.0" class="pc_caption">even though no accepted primer pair remains.</text><g data-molecule-id="selected_roi_under_review" data-topology="linear"><text x="1048.0" y="240.0" class="pc_mol_label">ROI retained for review</text><text x="1048.0" y="288.0" class="pc_end_label" text-anchor="start">blunt</text><text x="1322.0" y="288.0" class="pc_end_label" text-anchor="end">blunt</text><rect x="1100.4" y="254.0" width="171.1" height="8" fill="#2a9d8f"/><rect x="1100.4" y="265.0" width="171.1" height="8" fill="#2a9d8f"/></g><path d="M 1344.0 289.0 L 1358.0 289.0" class="pc_link"/><rect class="pc_box" x="1364.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="report_only" data-action="Report"/><circle cx="1388.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="1388.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">5</text><text x="1410.0" y="144.0" class="pc_panel_title">Report Only</text><text x="1382.0" y="166.0" class="pc_panel_sub">Report</text><text x="1382.0" y="186.0" class="pc_caption">No amplicon product is emitted; users inspect</text><text x="1382.0" y="202.0" class="pc_caption">the retained ROI context and the failure</text><text x="1382.0" y="218.0" class="pc_caption">report rather than a product container.</text><g data-molecule-id="selected_roi_report_only" data-topology="linear"><text x="1380.0" y="240.0" class="pc_mol_label">ROI retained for report</text><text x="1380.0" y="288.0" class="pc_end_label" text-anchor="start">blunt</text><text x="1654.0" y="288.0" class="pc_end_label" text-anchor="end">blunt</text><rect x="1432.4" y="254.0" width="171.1" height="8" fill="#2a9d8f"/><rect x="1432.4" y="265.0" width="171.1" height="8" fill="#2a9d8f"/></g><text x="36.0" y="470.0" class="pc_caption">Model: event-sequence abstraction (features + overhangs + topology) | deterministic SVG export.</text></svg>