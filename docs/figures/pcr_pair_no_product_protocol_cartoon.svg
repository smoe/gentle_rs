<svg xmlns="http://www.w3.org/2000/svg" width="1708" height="486" viewBox="0 0 1708 486" role="img" aria-labelledby="title desc" data-protocol-id="pcr.assay.pair.no_product"><title id="title">GENtle Protocol Cartoon: PCR Assay (report-only no-product)</title><desc id="desc">Five-step pair-PCR strip where a defined ROI remains inspectable but no accepted primer pair yields an amplicon product.</desc><defs><linearGradient id="pc_bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5fbff"/><stop offset="100%" stop-color="#edf8f5"/></linearGradient><linearGradient id="pc_panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f6fafb"/></linearGradient><marker id="pc_arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#4e6d78"/></marker><style>.pc_title { font: 700 36px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #0f2a36; }.pc_sub { font: 500 18px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #36535d; }.pc_panel_title { font: 700 21px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #123746; }.pc_panel_sub { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #3f5f68; }.pc_caption { font: 500 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #466570; }.pc_mol_label { font: 600 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #2d4f5b; }.pc_end_label { font: 600 11px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #375965; }.pc_feature_marker_text { font: 700 10px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_step_num { font: 700 13px 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #ffffff; }.pc_box { fill: url(#pc_panel); stroke: #c8dde3; stroke-width: 2; }.pc_link { stroke: #4e6d78; stroke-width: 3.2; marker-end: url(#pc_arrow); fill: none; }</style></defs><rect x="0" y="0" width="1708" height="486" fill="url(#pc_bg)"/><rect x="14" y="14" width="1680" height="458" rx="22" fill="none" stroke="#d4e4e8" stroke-width="2"/><text x="36.0" y="66.0" class="pc_title">GENtle Protocol Cartoon: PCR Assay (report-only no-product)</text><text x="36.0" y="94.0" class="pc_sub">Five-step pair-PCR strip where a defined ROI remains inspectable but no accepted primer pair yields an amplicon product.</text><rect class="pc_box" x="36.0" y="114.0" width="308.0" height="324.0" rx="18" data-event-id="context" data-action="Context"/><circle cx="60.0" cy="138.0" r="12" fill="#2b8ea8"/><text x="60.0" y="138.5" class="pc_step_num" text-anchor="middle" dominant-baseline="middle">1</text><text x="82.0" y="144.0" class="pc_panel_title">Context</text><text x="54.0" y="166.0" class="pc_panel_sub">Context</text><text x="54.0" y="186.0" class="pc_caption">A source template contains one user-selected</text><text x="54.0" y="202.0" class="pc_caption">ROI inside broader sequence context.</text><g data-molecule-id="template_context" data-topology="linear"><text x="52.0" y="240.0" class="pc_mol_label">Source template</text><rect x="104.4" y="254.0" width="45.8" height="8" fill="#c9b37e"/><rect x="150.3" y="254.0" width="9.2" height="8" fill="#b5476d"/><rect x="159.4" y="254.0" width="61.1" height="8" fill="#2a9d8f"/><rect x="220.6" y="254.0" width="9.2" height="8" fill="#4c5d9e"/><rect x="229.7" y="254.0" width="45.8" height="8" fill="#c9b37e"/><rect x="104.4" y="265.0" width="45.8" height="8" fill="#c9b37e"/><rect x="150.3" y="265.0" width="9.2" height="8" fill="#b5476d"/><rect x="159.4" y="265.0" width="61.1" height="8" fill="#2a9d8f"/><rect x="220.6" y="265.0" width="9.2" height="8" fill="#4c5d9e"/><rect x="229.7" y="265.0" width="45.8" height="8" fill="#c9b37e"/><line x1="154.9" y1="254.0" x2="154.9" y2="248.0" stroke="#b5476d" stroke-width="1.8"/><circle cx="154.9" cy="242.0" r="6.5" fill="#b5476d" data-feature-marker="F"/><text x="154.9" y="242.5" class="pc_feature_marker_text" text-anchor="midd